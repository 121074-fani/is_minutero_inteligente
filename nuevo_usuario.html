<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Usuario - Minutero</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/styles_nuevo_usuario.css">
    <link rel="stylesheet" href="css/responsive.css">
    <script src="js/sidebar.js"></script>
</head>
<body>
    <div class="container">
        <app-sidebar></app-sidebar>

        <main class="main-content d-flex justify-content-center align-items-center">
            <div class="form-wrapper shadow-lg p-5 bg-white rounded">
                <div class="text-center mb-4">
                    <h2 class="fw-bold"><i class="fas fa-user-plus text-primary"></i> Registrar Nuevo Usuario</h2>
                    <p class="text-muted">Ingresa los datos del colaborador</p>
                </div>
                
                <form id="formNuevoUsuario" novalidate>
                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <label class="form-label fw-bold">Nombre Completo</label>
                            <input type="text" class="form-control premium-input" id="nombre" placeholder="Ej. Juan Pérez" required>
                            <div class="invalid-feedback">El nombre es obligatorio.</div>
                        </div>
                        <div class="col-md-6 mb-4">
                            <label class="form-label fw-bold">RFC</label>
                            <input type="text" class="form-control premium-input" id="rfc" placeholder="Ej. XAXX010101000" required>
                            <div class="invalid-feedback">El RFC es obligatorio.</div>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold">Correo Electrónico</label>
                        <div class="input-group">
                            <span class="input-group-text premium-addon"><i class="fas fa-envelope"></i></span>
                            <input type="email" class="form-control premium-input" id="correo" placeholder="correo@empresa.com" required>
                            <div class="invalid-feedback" id="correoError">Por favor ingresa un correo electrónico válido.</div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <label class="form-label fw-bold">Rol en el Sistema</label>
                            <select class="form-select premium-input" id="rol" required>
                                <option value="" disabled selected>Selecciona un rol...</option>
                                <option value="admin">Administrador</option>
                                <option value="minutero">Minutero</option>
                                <option value="empleado">Empleado</option>
                            </select>
                            <div class="invalid-feedback">Debes seleccionar un rol.</div>
                        </div>
                        <div class="col-md-6 mb-4">
                            <label class="form-label fw-bold">Teléfono (Opcional)</label>
                            <input type="tel" class="form-control premium-input" id="telefono" placeholder="10 dígitos">
                        </div>
                    </div>
                    
                    <div class="mb-4">
                            <label class="form-label fw-bold">Contraseña</label>
                            <div class="input-group">
                                <span class="input-group-text premium-addon"><i class="fas fa-lock"></i></span>
                                <input type="password" class="form-control premium-input" id="password" placeholder="Mínimo 6 caracteres" required minlength="6">
                                <div class="invalid-feedback">La contraseña es obligatoria.</div>
                            </div>
                        </div>
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4 pt-3 border-top">
                        <button type="button" class="btn btn-light px-4 btn-custom" onclick="window.location.href='gestion_usuarios.html'">Cancelar</button>
                        <button type="submit" class="btn btn-primary px-5 btn-custom shadow"><i class="fas fa-save me-2"></i> Guardar Usuario</button>
                    </div>
                </form>
                
                <div id="mensajeExito" class="alert alert-success mt-4 d-none custom-alert" role="alert">
                    <i class="fas fa-check-circle me-2"></i> Usuario registrado exitosamente. Redirigiendo al catálogo...
                </div>
            </div>
        </main>
    </div>

    <script src="js/script_nuevo_usuario.js"></script>
</body>
</html>
