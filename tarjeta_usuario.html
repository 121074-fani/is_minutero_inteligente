<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de Usuario - Minutero</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/side-bar.css">
    <link rel="stylesheet" href="css/responsive.css">
    <script src="js/sidebar.js"></script>
    <style>
        body { background:#f5eef8; font-family:'Segoe UI',sans-serif; }
        .prof-wrapper { display:flex; min-height:100vh; }
        .main-content { flex:1; margin-left:260px; padding:30px; }
        .profile-card { background:white; border-radius:24px; overflow:hidden; box-shadow:0 4px 24px rgba(0,0,0,.08); display:flex; min-height:500px; }
        .left-panel { width:300px; flex-shrink:0; background:linear-gradient(160deg,#4a235a,#9b59b6); color:white; padding:40px 28px; display:flex; flex-direction:column; align-items:center; }
        .avatar-ring { width:130px; height:130px; border-radius:50%; border:4px solid rgba(255,255,255,.4); overflow:hidden; margin-bottom:18px; }
        .avatar-ring img { width:100%; height:100%; object-fit:cover; }
        .u-name { font-size:1.5rem; font-weight:700; text-align:center; margin-bottom:4px; }
        .u-rol  { font-size:.85rem; opacity:.75; margin-bottom:20px; background:rgba(255,255,255,.15); padding:4px 14px; border-radius:20px; }
        .info-item { width:100%; margin-bottom:12px; }
        .info-item .lbl { font-size:.72rem; opacity:.65; text-transform:uppercase; letter-spacing:.5px; }
        .info-item .val { font-size:.9rem; font-weight:600; word-break:break-all; }
        /* teléfono editable */
        .tel-edit { display:flex; gap:6px; align-items:center; width:100%; margin-top:4px; }
        .tel-edit input { flex:1; background:rgba(255,255,255,.2); border:1px solid rgba(255,255,255,.4); border-radius:8px; padding:6px 10px; color:white; font-size:.88rem; }
        .tel-edit input::placeholder { color:rgba(255,255,255,.6); }
        .tel-edit input:focus { outline:none; background:rgba(255,255,255,.3); }
        .btn-save-tel { padding:6px 12px; border-radius:8px; border:1px solid rgba(255,255,255,.4); background:rgba(255,255,255,.2); color:white; font-size:.78rem; cursor:pointer; white-space:nowrap; transition:all .2s; }
        .btn-save-tel:hover { background:rgba(255,255,255,.35); }
        .btn-back-prof { margin-top:auto; width:100%; padding:11px; background:rgba(255,255,255,.2); color:white; border:2px solid rgba(255,255,255,.4); border-radius:12px; cursor:pointer; font-weight:600; transition:all .2s; }
        .btn-back-prof:hover { background:rgba(255,255,255,.35); }
        .right-panel { flex:1; padding:36px; display:flex; flex-direction:column; }
        .panel-title { font-size:1.1rem; font-weight:700; color:#4a235a; margin-bottom:16px; }
        .task-item { background:#f9f5fc; border-radius:10px; padding:12px 16px; margin-bottom:8px; display:flex; align-items:center; gap:12px; }
        .task-item .dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
        .task-item .dot.pendiente   { background:#f39c12; }
        .task-item .dot.completada  { background:#27ae60; }
        .task-item .dot.en_progreso { background:#3498db; }
        .stat-box { background:#f5eef8; border-radius:12px; padding:14px; text-align:center; flex:1; }
        .stat-box .n { font-size:1.6rem; font-weight:700; color:#4a235a; }
        .stat-box .l { font-size:.75rem; color:#888; }
        .action-row { display:flex; gap:12px; margin-top:auto; padding-top:20px; }
        .btn-del-prof { flex:1; padding:11px; border-radius:12px; border:none; background:#fdecea; color:#e74c3c; font-weight:600; cursor:pointer; transition:all .2s; }
        .btn-del-prof:hover { background:#fad7d4; }
        @media(max-width:991px){ .main-content{ margin-left:0; padding:14px; } .profile-card{ flex-direction:column; } .left-panel{ width:100%; } }
    </style>
</head>
<body>
<div class="prof-wrapper">
    <app-sidebar></app-sidebar>
    <main class="main-content">
        <div class="d-flex align-items-center gap-3 mb-4">
            <button onclick="window.location.href='gestion_usuarios.html'"
                    style="background:#f5eef8;border:none;border-radius:50%;width:38px;height:38px;color:#9b59b6;cursor:pointer;">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h2 class="fw-bold mb-0" style="color:#4a235a;">Perfil de Usuario</h2>
        </div>

        <div class="profile-card">
            <div class="left-panel">
                <div class="avatar-ring">
                    <img id="user-photo" src="https://ui-avatars.com/api/?name=U&background=9b59b6&color=fff&size=150" alt="Avatar">
                </div>
                <div class="u-name" id="u-nombre">Cargando...</div>
                <div class="u-rol"  id="u-rol">—</div>

                <div class="info-item">
                    <div class="lbl">RFC</div>
                    <div class="val" id="u-rfc">—</div>
                </div>
                <div class="info-item">
                    <div class="lbl">Correo</div>
                    <div class="val" id="u-correo">—</div>
                </div>
                <!-- Teléfono editable -->
                <div class="info-item">
                    <div class="lbl">Teléfono</div>
                    <div class="tel-edit">
                        <input type="tel" id="u-tel-input" placeholder="10 dígitos">
                        <button class="btn-save-tel" id="btn-guardar-tel">
                            <i class="fas fa-save me-1"></i>Guardar
                        </button>
                    </div>
                </div>
                <div class="info-item">
                    <div class="lbl">Fecha de registro</div>
                    <div class="val" id="u-fecha">—</div>
                </div>

                <button class="btn-back-prof mt-4" onclick="window.location.href='gestion_usuarios.html'">
                    <i class="fas fa-arrow-left me-2"></i>Regresar al Catálogo
                </button>
            </div>

            <div class="right-panel">
                <div class="d-flex gap-3 mb-4">
                    <div class="stat-box"><div class="n" id="stat-total">0</div><div class="l">Total Tareas</div></div>
                    <div class="stat-box"><div class="n" id="stat-pend" style="color:#f39c12;">0</div><div class="l">Pendientes</div></div>
                    <div class="stat-box"><div class="n" id="stat-comp" style="color:#27ae60;">0</div><div class="l">Completadas</div></div>
                </div>

                <div class="panel-title">
                    <i class="fas fa-tasks me-2" style="color:#9b59b6;"></i>Tareas Asignadas
                    <span id="status-tag" class="badge ms-2" style="background:#f5eef8;color:#9b59b6;font-size:.75rem;"></span>
                </div>

                <div id="tareas-container" style="flex-grow:1;overflow-y:auto;max-height:280px;">
                    <p class="text-muted small" id="msg-tareas">Buscando tareas...</p>
                </div>

                <div class="action-row">
                    <button class="btn-del-prof" id="btn-eliminar">
                        <i class="fas fa-user-times me-2"></i>Eliminar Usuario
                    </button>
                </div>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script_detalles_usuario.js"></script>
</body>
</html>
