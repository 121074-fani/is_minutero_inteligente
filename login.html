<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minutero Inteligente - Acceso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'Segoe UI',sans-serif;min-height:100vh;background:#f5eef8;
             display:flex;align-items:center;justify-content:center;padding:16px;}

        .card-login{
            background:white;border-radius:24px;overflow:hidden;
            display:flex;width:100%;max-width:860px;
            box-shadow:0 8px 40px rgba(74,35,90,.18);
        }

        /* Panel izquierdo — decorativo */
        .panel-izq{
            background:linear-gradient(145deg,#4a235a,#9b59b6);
            width:44%;flex-shrink:0;
            display:flex;flex-direction:column;
            align-items:center;justify-content:center;
            padding:48px 36px;color:white;position:relative;overflow:hidden;
        }
        .panel-izq h1{font-size:1.7rem;font-weight:800;margin-bottom:10px;line-height:1.2;}
        .panel-izq p{font-size:.88rem;opacity:.8;line-height:1.6;text-align:center;}
        .panel-izq .icon-big{font-size:3.5rem;margin-bottom:22px;opacity:.9;}
        /* burbujas decorativas */
        .burbuja{position:absolute;border-radius:50%;background:rgba(255,255,255,.08);}
        .b1{width:180px;height:180px;bottom:-60px;right:-60px;}
        .b2{width:100px;height:100px;top:-30px;left:-30px;}

        /* Panel derecho — formulario */
        .panel-der{
            flex:1;padding:48px 40px;
            display:flex;flex-direction:column;justify-content:center;
        }
        .panel-der h2{color:#4a235a;font-size:1.5rem;font-weight:700;margin-bottom:4px;}
        .panel-der .sub{color:#888;font-size:.88rem;margin-bottom:28px;}

        .form-label{font-size:.85rem;font-weight:600;color:#4a235a;margin-bottom:4px;}
        .input-group-text{background:#f5eef8;border:1px solid #e0d0ec;color:#9b59b6;}
        .form-control{border:1px solid #e0d0ec;border-radius:0 8px 8px 0 !important;
                      padding:10px 14px;font-size:.9rem;}
        .form-control:focus{border-color:#9b59b6;box-shadow:0 0 0 3px rgba(155,89,182,.15);}
        .input-group .input-group-text{border-radius:8px 0 0 8px !important;}

        .btn-login{
            background:linear-gradient(135deg,#4a235a,#9b59b6);
            color:white;border:none;border-radius:12px;
            padding:12px;font-size:.95rem;font-weight:700;
            width:100%;min-height:48px;cursor:pointer;
            transition:all .2s;letter-spacing:.3px;
        }
        .btn-login:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(155,89,182,.35);}
        .btn-login:disabled{opacity:.6;transform:none;cursor:not-allowed;}

        .nota-admin{
            text-align:center;margin-top:20px;padding:12px 16px;
            background:#f9f5fc;border-radius:10px;
            font-size:.82rem;color:#888;
        }
        .nota-admin span{color:#9b59b6;font-weight:600;}

        #mensajeForm{border-radius:10px;font-size:.85rem;padding:10px 14px;}

        /* ── Responsive ── */
        @media(max-width:640px){
            .panel-izq{display:none;}
            .panel-der{padding:32px 24px;}
            .card-login{border-radius:18px;}
        }
        @media(max-width:380px){
            body{padding:0;}
            .card-login{border-radius:0;min-height:100vh;align-items:center;}
            .panel-der{padding:28px 18px;}
        }
    </style>
</head>
<body>

<div class="card-login">
    <!-- Panel decorativo -->
    <div class="panel-izq">
        <div class="burbuja b1"></div>
        <div class="burbuja b2"></div>
        <div class="icon-big"><i class="fas fa-tasks"></i></div>
        <h1>Minutero Inteligente</h1>
        <p>Gestión digital de minutas y reuniones académicas del Instituto Tecnológico de Morelia.</p>
    </div>

    <!-- Formulario -->
    <div class="panel-der">
        <h2>¡Bienvenido!</h2>
        <div class="sub">Ingresa con tu cuenta institucional</div>

        <form id="authForm" novalidate>
            <div class="mb-3">
                <label class="form-label">Correo electrónico</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="far fa-envelope"></i></span>
                    <input type="email" class="form-control" name="correo"
                           placeholder="correo@itm.edu.mx" required autocomplete="email">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" name="password"
                           placeholder="Tu contraseña" required minlength="6"
                           autocomplete="current-password">
                    <button type="button" class="btn btn-outline-secondary"
                            style="border-color:#e0d0ec;border-radius:0 8px 8px 0 !important;"
                            onclick="togglePass(this)">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="mb-4">
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" id="remember">
                    <label class="form-check-label text-muted" style="font-size:.82rem;" for="remember">
                        Mantener sesión iniciada
                    </label>
                </div>
            </div>

            <div id="mensajeForm" class="d-none mb-3"></div>

            <button type="submit" class="btn-login" id="submitBtn">
                <i class="fas fa-sign-in-alt me-2"></i>Iniciar sesión
            </button>
        </form>

        <!-- Nota: solo admin registra usuarios -->
        <div class="nota-admin">
            <i class="fas fa-info-circle me-1" style="color:#9b59b6;"></i>
            ¿No tienes cuenta? Contacta al
            <span>administrador del sistema</span> para registrarte.
        </div>
    </div>
</div>

<script src="js/script_login.js"></script>
<script>
function togglePass(btn) {
    const input = btn.parentElement.querySelector('input');
    const icon  = btn.querySelector('i');
    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fas fa-eye-slash';
    } else {
        input.type = 'password';
        icon.className = 'fas fa-eye';
    }
}
</script>
</body>
</html>
